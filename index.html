    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { height: 100%; height: -webkit-fill-available; }
    body {
      height: 100%;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      overflow: hidden;
      -webkit-text-size-adjust: 100%;
    }
    #root { height: 100%; height: 100dvh; }
    input, select, textarea { font-size: 16px !important; }
    button { -webkit-appearance: none; }
    * { -webkit-overflow-scrolling: touch; }
  </style>
  <script>
    // Fix iOS Safari 100vh bug
    function setVh() {
      document.documentElement.style.setProperty('--vh', window.innerHeight * 0.01 + 'px');
    }
    setVh();
    window.addEventListener('resize', setVh);
    window.addEventListener('orientationchange', function() { setTimeout(setVh, 300); });
  </script>
  <!-- SheetJS for Excel import - loads when online, gracefully skipped if offline -->
  <script>
    (function() {
      var s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
      s.onerror = function() { window._xlsxOffline = true; };
      document.head.appendChild(s);
    })();
  </script>
